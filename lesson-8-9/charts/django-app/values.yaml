replicaCount: 2

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  DJANGO_DEBUG: "0"
  DJANGO_ALLOWED_HOSTS: "*"
  POSTGRES_DB: "app_db"
  POSTGRES_USER: "app_user"
  POSTGRES_HOST: "db"
  POSTGRES_PORT: "5432"

secrets:
  DJANGO_SECRET_KEY: "change-me-to-a-random-secret-key"
  POSTGRES_PASSWORD: "app_password"
